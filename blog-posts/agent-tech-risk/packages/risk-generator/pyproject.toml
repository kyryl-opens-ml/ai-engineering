[project]
name = "risk-generator"
version = "0.1.0"
description = "AWS Risk Case Generator for PE Technical Due Diligence"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "anthropic>=0.40",
    "pyyaml>=6.0",
    "typer>=0.12",
    "rich>=13.0",
    "boto3>=1.35",
    "docker>=7.0",
    "python-dotenv>=1.0",
    "claude-agent-sdk",
]

[project.scripts]
risk-generator = "risk_generator.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
exclude = [".env", ".env.*", "*.pyc", "__pycache__"]

[tool.hatch.build.targets.wheel]
packages = ["src/risk_generator"]
