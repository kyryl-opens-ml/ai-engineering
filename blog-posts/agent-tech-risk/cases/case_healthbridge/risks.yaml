- category: tr1
  resource: "HealthBridge-DevOps-Admin-Policy"
  issue: "Policy grants wildcard permissions (*:*) on all AWS resources"
  severity: critical
  why: "Created during 2022 Series B rush when DevOps team needed to quickly migrate from on-prem. Never refined post-migration due to competing product priorities."

- category: tr1
  resource: "HealthBridge-DevOps-CrossAccount"
  issue: "Cross-account trust policy allows any AWS principal (*) to assume this admin role"
  severity: critical
  why: "Implemented hastily in late 2022 to support acquired MedTech startup's existing AWS accounts. Original plan to restrict principals was deprioritized after integration challenges."

- category: tr1
  resource: "HealthBridge-Data-Processing-Policy"
  issue: "Overly broad permissions including s3:*, dynamodb:*, secretsmanager:* on all resources"
  severity: high
  why: "Created by data science team lead who left in Q1 2023. Permissions kept expanding to avoid blocking ML pipeline deployments during Series C fundraising."

- category: tr1
  resource: "HealthBridge-Legacy-Admin-Policy"
