- category: tr1
  resource: arn:aws:iam::123456789012:policy/DevOpsFullAccess
  issue: "IAM policy grants unrestricted access with Action: '*' and Resource: '*', providing full administrative privileges"
  severity: critical
  why: "Created during initial setup by founding CTO who needed to move fast. The policy was meant to be temporary for the first deployment sprint but became the default for DevOps work and CI/CD pipelines. With only 2 infrastructure engineers initially, it was easier than managing granular permissions."
  evidence:
    policy_document:
      Statement:
        - Sid: "FullAccessForDevOps"
          Effect: "Allow"
          Action: "*"
          Resource: "*"
  impact: "Any compromise of EC2 instances with this role, the deploy-bot service account, or the CI/CD pipeline grants full AWS account access including ability to read secrets, modify production databases, and delete critical resources."

- category: tr1
  resource: arn:aws:iam::123456789012:policy/DataSciencePolicy
  issue: "IAM policy grants wildcard permissions for S3, SageMaker, and Athena (Action: 's3:*', 'sagemaker:*', 'athena:*' on Resource: '*')"
  severity: high
  why: "Data science team needed access to experiment with different buckets and ML resources. Rather than maintain a list of specific resources, the infrastructure team granted broad permissions. The team is small (3 data scientists) and the CTO knows them personally, so it felt acceptable."
  evidence:
    policy_document:
      Statement:
        - Effect: "Allow"
          Action: ["s3:*"]
          Resource: "*"
        - Effect: "Allow"
          Action: ["sagemaker:*"]
          Resource: "*"
  impact: "Data scientists can access all S3 buckets including production customer data, modify or delete ML models in production, and spin up expensive SageMaker resources. A compromised ML workstation could lead to data exfiltration."

- category: tr1
  resource: arn:aws:iam::123456789013:role/CrossAccountAuditorRole
  issue: "Cross-account role trusts any AWS principal (Principal: '*') with only an ExternalId for protection"
  severity: high
  why: "Setup quickly for SOC 2 audit by an external security consultant. The ExternalId was meant to be temporary. The auditors needed read access across all three AWS accounts. After the audit, the role wasn't removed because 'we might need it for the next audit' and the ExternalId was documented in a shared wiki."
  evidence:
    assume_role_policy:
      Statement:
        - Effect: "Allow"
          Principal:
            AWS: "*"
          Action: "sts:AssumeRole"
          Condition:
            StringEquals:
              "sts:ExternalId": "payflow-audit-2024"
  impact: "Anyone who discovers or guesses the ExternalId can assume this role from any AWS account globally and gain read access to all resources. The ExternalId is stored in documentation accessible to all engineers."

- category: tr7
  resource: arn:aws:rds:us-east-1:123456789012:db:payflow-prod-db
  issue: "Production database is single-AZ (multi_az: false) with no high availability failover"
  severity: critical
  why: "Originally deployed as single-AZ to reduce costs during MVP phase when the company had limited runway. Multi-AZ would double the RDS costs (~$400/month extra). The team planned to enable it 'after Series A' but it kept getting deprioritized. Database has been stable, and the weekly maintenance window hasn't caused issues yet."
  evidence:
    multi_az: false
    availability_zone: "us-east-1a"
    db_instance_class: "db.t3.large"
  impact: "Any AZ failure or hardware issue causes complete database outage. RTO is 30+ minutes for recovery from backup. Financial transactions cannot be processed during outage, directly impacting revenue and customer trust."

- category: tr7
  resource: arn:aws:rds:us-east-1:123456789012:db:payflow-analytics-db
  issue: "Analytics database is single-AZ with no redundancy and only 3-day backup retention"
  severity: medium
  why: "Analytics database was added by the data science team for ML model training and reporting. Treated as 'non-critical' since it doesn't serve production traffic. The 3-day backup window matches the typical data refresh cycle. Team assumes they can rebuild from production if needed."
  evidence:
    multi_az: false
    availability_zone: "us-east-1a"
    backup_retention_period: 3
  impact: "Loss of this database impacts business intelligence, financial reporting, and ML model training. Historical analytics data older than 3 days cannot be recovered. Rebuilding from production could take days and may not be possible if production is also affected."

- category: tr7
  resource: arn:aws:ec2:us-east-1:123456789012:natgateway/nat-0a1b2c3d4e5f6g7h8
  issue: "Single NAT Gateway in us-east-1a serves all private subnets including those in us-east-1b"
  severity: high
  why: "Cost optimization decision - each NAT Gateway costs ~$32/month plus data transfer fees. With one NAT Gateway instead of two (one per AZ), the company saves $384/year. During architectural review, the team noted that most traffic is within the VPC, so internet-bound traffic from private subnets is relatively low."
  evidence:
    nat_gateway_count: 1
    subnet_id: "subnet-1b2c3d4e"
    availability_zone: "us-east-1a"
    serves_subnets: ["subnet-0a1b2c3d", "subnet-2c3d4e5f"]
  impact: "If us-east-1a experiences an outage, all resources in private subnets lose internet connectivity, including API servers in us-east-1b. This prevents outbound API calls to payment processors (Stripe), notification services, and prevents EC2 instances from reaching internet endpoints for updates or third-party APIs. Cross-AZ data transfer charges for traffic routing through us-east-1a NAT also increase costs."
