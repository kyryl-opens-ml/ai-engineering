- category: tr9
  resource: arn:aws:rds:us-east-1:847293016582:db:meddata-analytics-readonly
  issue: "RDS instance has backup_retention_period set to 0 (backups disabled)"
  severity: high
  why: "Read replica for analytics queries. Team assumed primary database backups were sufficient. Disabled backups to reduce storage costs during budget cuts. Instance was later repurposed as source for data exports but backup configuration never updated."

- category: tr9
  resource: arn:aws:rds:us-east-1:847293016582:db:meddata-analytics-readonly
  issue: "RDS instance is single-AZ with no Multi-AZ deployment"
  severity: medium
  why: "Analytics read replica, originally considered non-critical. Now used by real-time dashboards shown to hospital executives. Upgrading to Multi-AZ requires downtime window that's hard to schedule given 24/7 dashboard usage."

- category: tr9
  resource: arn:aws:s3:::meddata-patient-records-prod
  issue: "S3 bucket has no cross-region replication configured for disaster recovery"
  severity: high
  why: "Bucket contains critical PHI data. Cross-region replication was in original architecture but removed during cost optimization. HIPAA DR plan assumes RTO of 24 hours, team believes backup/restore from Glacier is sufficient. Business continuity team disagrees."

- category: tr9
  resource: arn:aws:s3:::meddata-analytics-data
  issue: "S3 bucket has no cross-region replication and versioning is suspended"
  severity: medium
  why: "Analytics data regenerated nightly from primary database. Versioning disabled to save costs. Recent incident where corrupted export went unnoticed for 3 days highlighted risk, but replication still not enabled due to data volume costs."

- category: tr11
  resource: arn:aws:eks:us-east-1:847293016582:cluster/meddata-prod-eks
  issue: "cluster-admin ClusterRole bound to default ServiceAccount in kube-system namespace"
  severity: critical
  why: "Created during initial EKS setup following outdated tutorial. Multiple services use this service account. Platform team tried to remove it but caused widespread outages during rollback. Proper RBAC redesign scheduled for Q2 2026 but requires audit of all 47 microservices."

- category: tr11
  resource: arn:aws:eks:us-east-1:847293016582:cluster/meddata-prod-eks
  issue: "Using deprecated Kubernetes API batch/v1beta1 for CronJob 'nightly-data-export'"
  severity: medium
  why: "CronJob created on EKS 1.19, now running on 1.27. Team aware of deprecation but job is mission-critical for regulatory reporting. Original engineer left, new team hesitant to modify without full testing. Planned upgrade keeps getting postponed."

- category: tr11
  resource: arn:aws:eks:us-east-1:847293016582:cluster/meddata-prod-eks
  issue: "Using deprecated Kubernetes API policy/v1beta1 for PodSecurityPolicy 'restricted-psp'"
  severity: medium
  why: "PodSecurityPolicy was cluster security standard. PSP deprecated in 1.21, removed in 1.25. Team running 1.27 which doesn't support PSP - policy has no effect. Migration to Pod Security Standards requires testing with 200+ existing deployments. Security team aware but focused on other priorities."

- category: tr11
  resource: arn:aws:eks:us-east-1:847293016582:cluster/meddata-prod-eks
  issue: "No NetworkPolicies defined in EKS cluster - all pods can communicate with all other pods"
  severity: high
  why: "Initial EKS deployment prioritized speed over security. Team planned to add NetworkPolicies after stabilization but never happened. Installing CNI with NetworkPolicy support (Calico/Cilium) requires cluster-wide network disruption. Risk accepted because cluster is in private VPC with security groups."
