- category: tr1
  resource: "PayFlow-API-Overprivileged-Policy"
  issue: "IAM policy grants wildcard permissions (*) on all actions and resources"
  severity: critical
  why: "Created during Series A fundraising crunch when the API team needed to rapidly integrate with multiple payment processors. The 'temporary' overly permissive policy was never refined after the funding round closed."

- category: tr1
  resource: "PayFlow-Legacy-Admin-Role"
  issue: "Cross-account trust policy allows any AWS principal (*) to assume this admin role"
  severity: critical
  why: "Left over from the company's early days when the founder's previous startup's AWS account needed emergency access during a critical payment outage. The wildcard trust was never removed after the crisis."

- category: tr1
  resource: "PayFlow-Admin-Everything-Policy"
  issue: "Policy attached to founder's user grants unrestricted access to all AWS services and resources"
  severity: high
  why: "Sarah, the founder and CTO, created this policy in the first month when she was the only technical person. As the team grew to 50 engineers, the policy was never restricted despite multiple security reviews."

- category: tr4
  resource: "payflow-admin-sg"
  issue: "Security group allows SSH access (port 22) from any IP address (0.0.0.0/0)"
  severity: high
  why: "During the COVID-19 pandemic, developers working from various locations needed emergency server access. The temporary 'work from anywhere' security group was never tightened when the office reopened."

- category: tr4
  resource: "payflow-database-sg"
  issue: "Security group allows database access (port 5432) from any IP address (0.0.0.0/0)"
  severity: critical
  why: "Created during a late-night production incident when the database connection was failing. The junior developer on call opened it to the internet for quick debugging and forgot to revert the change."

- category: tr4
  resource: "payflow-dev-all-open"
  issue: "Development security group allows all TCP ports (0-65535) from any IP address"
  severity: medium
  why: "Built for the offshore development team in Eastern Europe who were struggling with VPN connectivity issues. The 'temporary' open access became permanent as it simplified their development workflow."

- category: tr1
  resource: "payflow-webhook-handler"
  issue: "Lambda function stores sensitive credentials (database password and API keys) in plaintext environment variables"
  severity: high
  why: "Webhook integration was built in 48 hours for a major client onboarding. The developer hardcoded secrets in environment variables to meet the deadline and migrate from the legacy system quickly."