- category: tr1
  resource: "InsureNet-FullAccess"
  issue: "Policy grants wildcard permissions (*:*) to all AWS services and resources"
  severity: critical
  why: "Created during 2019 startup phase for rapid deployment. Never refined as team grew from 3 to 150 engineers. Still used by legacy deployment scripts."

- category: tr1
  resource: "InsureNet-CrossAccountAccess"
  issue: "Cross-account role allows any AWS account (*:root) to assume role with broad permissions"
  severity: high
  why: "Added during 2021 acquisition of smaller insurtech startup. Needed quick cross-account access but used wildcard Principal for expediency during integration crunch."

- category: tr1
  resource: "InsureNet-ReadOnlyAccess"
  issue: "Policy named 'ReadOnly' actually grants full access to S3, EC2, and DynamoDB including write permissions"
  severity: high
  why: "Policy evolved from read-only during 2022 incident response when ops team needed emergency write access. Name never updated to reflect expanded permissions."

- category: tr1
  resource: "insurenet-deployer"
  issue: "Service account user has full administrative access across all AWS resources"
  severity: medium
  why: "Created by founding CTO who left in 2020. Used by CI/CD pipeline but never rotated or scoped down when security team was hired in 2023."

- category: tr4
  resource: "insurenet-web-sg"
  issue: "SSH port 22 open to entire internet (0.0.0.0/0) on production web servers"
  severity: high
  why: "Opened during December 2022 production outage for emergency access. Security team was on holiday, DevOps forgot to close after incident resolution."

- category: tr4
  resource: "insurenet-dev-all-open"
  issue: "All TCP ports (0-65535) open to internet in development security group"
  severity: medium
  why: "Created by frustrated developer in 2021 after VPN issues blocked deployment. Became standard for dev environment when other developers copied the configuration."

- category: tr4
  resource: "insurenet-database-sg"
  issue: "PostgreSQL port 5432 exposed to entire internet, allowing direct database access"
  severity: critical
  why: "Misconfigured during 2023 migration from on-premises. Junior engineer confused VPC CIDR with internet CIDR. Discovered only during this audit."

- category: tr4
  resource: "insurenet-api-sg"
  issue: "API endpoints on port 8080 exposed to public internet without authentication layer"
  severity: high
  why: "Temporary fix during Q4 2023 when load balancer SSL certificate expired. Direct API access enabled for customer demo, never reverted post-renewal."

- category: tr5
  resource: "insurenet/shared/api-keys"
  issue: "Single API key stored in SecretsManager used across all environments (dev, staging, prod)"
  severity: medium
  why: "Cost-saving measure from Series A constraints in 2020. Vendor charged per API key, so team used one key across environments to reduce licensing costs."

- category: tr1
  resource: "insurenet-quote-processor"
  issue: "Lambda function stores database password and API keys in plaintext environment variables"
  severity: high
  why: "Quick fix during Series B fundraising demo prep in early 2023. Developer bypassed SecretsManager to resolve Lambda timeout issues before investor presentation."

- category: tr1
  resource: "insurenet-claims-validator"
  issue: "Database connection string with embedded credentials stored in Lambda environment variables"
  severity: high
  why: "Legacy from pre-SecretsManager architecture. Function deployed by contractor in 2022 who followed old deployment templates before security standards were established."