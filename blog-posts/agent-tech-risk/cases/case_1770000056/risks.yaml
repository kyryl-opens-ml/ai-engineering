risks:
- category: tr1
  resource: arn:aws:iam::567890123456:policy/DeveloperFullAccess
  issue: IAM policy grants wildcard permissions (*:*) allowing full administrative
    access
  severity: critical
  why: Created during rapid growth phase to unblock developers - never refined as
    team matured
  _status: active
- category: tr1
  resource: arn:aws:iam::567890123456:role/PayFlowDevRole
  issue: Cross-account trust policy allows any AWS principal (*) to assume this role
  severity: high
  why: Originally set up for multi-account access during acquisition talks - trust
    policy was too permissive
  _status: active
- category: tr1
  resource: arn:aws:iam::567890123456:policy/LambdaExecutionPolicy
  issue: Lambda policy grants s3:* on all resources instead of specific buckets
  severity: high
  why: Lambda functions needed access to multiple buckets - broad permissions granted
    for simplicity
  _status: active
- category: tr1
  resource: arn:aws:iam::567890123456:policy/DataProcessingPolicy
  issue: Data processing policy grants excessive permissions (s3:*, rds:*, dynamodb:*)
    on all resources
  severity: high
  why: ETL pipeline needed flexible access to various data sources - permissions expanded
    over time without review
  _status: active
