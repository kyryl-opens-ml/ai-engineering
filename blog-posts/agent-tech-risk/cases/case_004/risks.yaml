- category: tr6
  resource: arn:aws:autoscaling:us-east-1:123456789012:autoScalingGroup:*:autoScalingGroupName/legacy-api-asg
  issue: "Auto Scaling Group has min_size=max_size=2, completely disabling autoscaling capability"
  severity: high
  why: "Legacy API was initially designed for 2 servers to handle the original customer base. When traffic patterns changed, the team planned to implement proper autoscaling but it was deprioritized because 'it still works'. The static size became a hidden constraint that will prevent the system from handling traffic spikes."

- category: tr6
  resource: arn:aws:lambda:us-east-1:123456789012:function:cloudsync-webhook-handler
  issue: "Lambda function has hardcoded DB_POOL_SIZE=5 in environment variables, preventing connection scaling under load"
  severity: medium
  why: "Originally configured during initial development when webhook volume was low. The team set a conservative pool size to avoid overwhelming the database. As webhook traffic grew 10x, they never revisited this configuration. The hardcoded value is now a bottleneck causing timeouts during peak webhook bursts."

- category: tr6
  resource: arn:aws:eks:us-east-1:123456789012:nodegroup/cloudsync-prod/cloudsync-prod-workers/12345678-1234-1234-1234-123456789012
  issue: "EKS node group has min_size=max_size=3, preventing horizontal scaling of Kubernetes workloads"
  severity: high
  why: "DevOps team set this during initial EKS migration to control costs while testing. The plan was to enable autoscaling after validating the migration, but this configuration change ticket got lost in the backlog. Meanwhile, the cluster runs at 75% capacity during normal operations, leaving no headroom for traffic spikes."

- category: tr8
  resource: arn:aws:rds:us-east-1:123456789012:db:cloudsync-prod-db
  issue: "Production database running on db.t2.micro with 100GB storage, severely under-provisioned for a company with 150 engineers and millions of users"
  severity: critical
  why: "This is the original database from CloudSync's MVP phase in 2022. The team kept postponing the migration because 'the app still responds' and they feared downtime during migration. They worked around performance issues by adding caching layers and read replicas (analytics-db). The database regularly hits 90% CPU but crashes are rare enough that leadership doesn't prioritize the upgrade."

- category: tr8
  resource: arn:aws:lambda:us-east-1:123456789012:function:cloudsync-file-processor
  issue: "Lambda function configured with only 128MB memory but processing large files up to 100MB, causing frequent timeouts and retries"
  severity: high
  why: "Originally built for thumbnail generation of small images (under 5MB). Product later added video processing and PDF conversion without updating infrastructure. The low memory allocation causes the function to timeout and retry repeatedly, burning through AWS costs while appearing to work (eventually succeeds after 3-4 retries). Engineers know about it but consider it a 'quirk' rather than a critical issue."

- category: tr8
  resource: arn:aws:ec2:us-east-1:123456789012:instance/i-0a1b2c3d4e5f6g7h8
  issue: "Production API worker running on t2.micro instance type, inadequate for production workload"
  severity: high
  why: "Part of the legacy sync API that was supposed to be fully migrated to Kubernetes 18 months ago. The migration stalled at 80% because this API has undocumented legacy client integrations that can't be updated. The team kept the bare minimum infrastructure running to support these legacy clients. T2.micro was chosen because 'it's just for a few old clients' but those clients still generate 15% of revenue."

- category: tr13
  resource: arn:aws:lambda:us-east-1:123456789012:function:cloudsync-webhook-handler
  issue: "Lambda function running Python 3.8 runtime which reached end-of-life in October 2024"
  severity: high
  why: "This function was written in early 2023 when Python 3.8 was still supported. The team tried upgrading to 3.11 in Q3 2024 but discovered the function uses an old version of a third-party webhook validation library that breaks on newer Python versions. The library is abandoned and would require rewriting the validation logic. This got deprioritized behind feature work, and the team accepted the AWS security warnings."

- category: tr13
  resource: arn:aws:eks:us-east-1:123456789012:cluster/cloudsync-prod
  issue: "EKS cluster running Kubernetes version 1.25, which is beyond standard support (current is 1.29, extended support ends April 2026)"
  severity: high
  why: "Cluster was created in September 2023 on the then-current version 1.25. The platform team planned quarterly upgrades but encountered issues during the 1.26 test upgrade - several third-party operators failed compatibility checks. Rather than fixing the operators, they postponed the upgrade. Each quarter the upgrade became more intimidating as the version gap grew. Now they're 4 minor versions behind and face a risky multi-hop upgrade path."

- category: tr13
  resource: arn:aws:ec2:us-east-1:123456789012:instance/i-0a1b2c3d4e5f6g7h8
  issue: "EC2 instance using Ubuntu 18.04 AMI from October 2023, which reached end-of-standard-support in May 2023"
  severity: medium
  why: "These are the legacy API workers that should have been decommissioned. The team is afraid to update the AMI because the application has undocumented system-level dependencies. Previous attempts to upgrade Ubuntu version caused the API to fail in mysterious ways. Since these instances are 'on their way out' (for the past 2 years), the team accepted running EOL software rather than investing time in understanding the dependencies."

- category: tr6
  resource: arn:aws:eks:us-east-1:123456789012:cluster/cloudsync-prod
  issue: "EKS cluster configured with endpoint_public_access=true and public_access_cidrs=['0.0.0.0/0'], allowing unrestricted API server access"
  severity: medium
  why: "Initially configured for ease of access during the EKS migration. The plan was to restrict this to VPN and office IPs after the migration stabilized. However, remote work policies changed, developers are distributed globally, and implementing a proper VPN solution got stuck in security team's backlog. The team decided public access with IAM authentication is 'good enough' rather than blocking developer productivity."

- category: tr8
  resource: arn:aws:rds:us-east-1:123456789012:db:cloudsync-prod-db
  issue: "Production database configured without Multi-AZ deployment, creating single point of failure"
  severity: high
  why: "Cost optimization decision from 2023 when the company was watching burn rate closely. The logic was 'we have backups and can restore in 30 minutes, that's acceptable downtime'. As the company grew, this was never revisited. Enabling Multi-AZ now requires downtime and careful coordination, so it keeps getting postponed for 'a slower month' that never comes."

- category: tr8
  resource: arn:aws:rds:us-east-1:123456789012:db:cloudsync-prod-db
  issue: "Production database has Performance Insights disabled and monitoring_interval=0, preventing effective performance troubleshooting"
  severity: medium
  why: "Originally disabled to reduce AWS costs during the startup phase. The team relied on application-level monitoring and basic CloudWatch metrics. When performance issues arose, they added the analytics read replica instead of enabling proper database monitoring on the primary. Nobody wanted to be the one to justify the extra $150/month cost increase to finance."

- category: tr13
  resource: arn:aws:ec2:us-east-1:123456789012:instance/i-1b2c3d4e5f6g7h8i9
  issue: "EC2 instance using Ubuntu 18.04 AMI from October 2023, which reached end-of-standard-support in May 2023"
  severity: medium
  why: "Second legacy API worker instance with same technical debt as i-0a1b2c3d4e5f6g7h8. Part of the auto-scaling group that can't scale. Both instances are running EOL operating systems because upgrading them requires understanding undocumented dependencies. The team views these as 'legacy infrastructure on life support' and avoids touching them."

- category: tr6
  resource: arn:aws:lambda:us-east-1:123456789012:function:cloudsync-file-processor
  issue: "Lambda function has no reserved concurrency limit, allowing unlimited concurrent executions that could exhaust account limits"
  severity: medium
  why: "This was intentional - the team removed concurrency limits during a Black Friday incident when file uploads spiked and the original limit (50) caused user-facing errors. They set it to unlimited as an emergency fix and never went back to implement proper throttling. Now the function can theoretically consume all account Lambda concurrency (1000), starving other functions."
